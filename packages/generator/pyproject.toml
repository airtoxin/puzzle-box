[project]
name = "generator"
version = "0.1.0"
description = "Generic puzzle instance generator"
authors = [
    { name = "airtoxin", email = "airtoxin@icloud.com" }
]
requires-python = ">=3.12"
dependencies = [
    "puzzle",
]

[build-system]
requires = ["uv_build>=0.10.12,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
puzzle = { workspace = true }
puzzle-defs = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "puzzle-defs",
]
