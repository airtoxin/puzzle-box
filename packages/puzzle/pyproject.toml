[project]
name = "puzzle"
version = "0.1.0"
description = "Declarative puzzle DSL backed by CP-SAT"
authors = [
    { name = "airtoxin", email = "airtoxin@icloud.com" }
]
requires-python = ">=3.12"
dependencies = [
    "ortools>=9.15.6755",
]

[build-system]
requires = ["uv_build>=0.10.12,<0.11.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
